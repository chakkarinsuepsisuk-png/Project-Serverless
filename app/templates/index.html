<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IT Repair Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            font-family: 'Kanit', sans-serif;
        }

        body{
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
                radial-gradient(circle at bottom right,#2563eb 0%,transparent 30%),
                linear-gradient(135deg,#050816,#0f172a,#111827);

            overflow-x:hidden;
            color:white;
        }

        /* Glow Background */
        body::before{
            content:'';
            position:fixed;
            width:600px;
            height:600px;
            background:#2563eb55;
            filter:blur(120px);
            top:-200px;
            left:-200px;
            z-index:-1;
        }

        body::after{
            content:'';
            position:fixed;
            width:500px;
            height:500px;
            background:#06b6d455;
            filter:blur(120px);
            bottom:-200px;
            right:-200px;
            z-index:-1;
        }

        .main-title{
            font-size:3rem;
            font-weight:800;
            text-align:center;
            margin-bottom:50px;
            letter-spacing:1px;
        }

        .main-title span{
            background:linear-gradient(90deg,#60a5fa,#22d3ee);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        /* Glass Card */
        .glass{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(20px);
            border-radius:28px;
            box-shadow:
                0 10px 40px rgba(0,0,0,0.35),
                inset 0 1px 1px rgba(255,255,255,0.05);

            transition:0.35s ease;
        }

        .glass:hover{
            transform:translateY(-6px);
            box-shadow:
                0 15px 45px rgba(0,0,0,0.45),
                0 0 30px rgba(59,130,246,0.25);
        }

        .section-title{
            font-weight:700;
            font-size:1.3rem;
            margin-bottom:25px;
            display:flex;
            align-items:center;
            gap:12px;
        }

        .icon-box{
            width:55px;
            height:55px;
            border-radius:18px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:linear-gradient(135deg,#2563eb,#06b6d4);
            font-size:1.4rem;

            box-shadow:0 10px 20px rgba(37,99,235,0.35);
        }

        label{
            margin-bottom:8px;
            font-weight:500;
            color:#dbeafe;
        }

        .form-control,
        .form-select{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.08);
            color:white;
            border-radius:16px;
            padding:14px;
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        .form-control:focus,
        .form-select:focus{
            background:rgba(255,255,255,0.12);
            border-color:#38bdf8;
            box-shadow:0 0 0 0.2rem rgba(56,189,248,0.25);
            color:white;
        }

        textarea{
            resize:none;
        }

        .btn-submit{
            height:58px;
            border:none;
            border-radius:18px;
            background:linear-gradient(135deg,#06b6d4,#2563eb);
            color:white;
            font-weight:700;
            font-size:1rem;

            transition:0.3s;
            box-shadow:0 10px 25px rgba(37,99,235,0.35);
        }

        .btn-submit:hover{
            transform:translateY(-2px) scale(1.01);
            box-shadow:0 15px 35px rgba(37,99,235,0.45);
        }

        /* Table */
        .table{
            margin:0;
            color:white;
        }

        .table thead tr{
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .table thead th{
            background:transparent;
            color:#93c5fd;
            font-weight:600;
            padding:18px 15px;
            border:none;
        }

        .table tbody tr{
            transition:0.25s ease;
            border-bottom:1px solid rgba(255,255,255,0.05);
        }

        .table tbody tr:hover{
            background:rgba(255,255,255,0.04);
        }

        .table td{
            padding:18px 15px;
            border:none;
            vertical-align:middle;
        }

        .ticket-id{
            color:#38bdf8;
            font-weight:700;
        }



        .stats-box{
            display:flex;
            justify-content:space-between;
            gap:15px;
            margin-bottom:25px;
        }

        .mini-card{
            flex:1;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:18px;
        }

        .mini-card h3{
            font-size:2rem;
            font-weight:800;
            margin:0;
        }

        .mini-card p{
            margin:0;
            color:#cbd5e1;
        }

        .table-responsive{
            border-radius:22px;
            overflow:hidden;
        }

        .empty{
            padding:50px !important;
            text-align:center;
            color:#94a3b8;
        }

        @media(max-width:992px){

            .main-title{
                font-size:2rem;
            }

            .stats-box{
                flex-direction:column;
            }
        }

    </style>
</head>

<body>

<div class="container py-5">

    <h1 class="main-title">
        <i class="bi bi-incognito"></i> <span>IT REPAIR</span> DASHBOARD
    </h1>



    <div class="row g-4">

        <!-- LEFT -->
        <div class="col-lg-4">

            <div class="glass p-4 h-100">

                <div class="section-title">
                    <div class="icon-box">
                        <i class="bi bi-cpu"></i>
                    </div>

                    แจ้งปัญหาใหม่
                </div>

                <form action="/ticket" method="POST">

                    <div class="mb-4">

                        <label>
                            ชื่อผู้แจ้ง
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="เช่น สมชาย ใจดี"
                               required>

                    </div>

                    <div class="mb-4">

                        <label>
                            อุปกรณ์ที่มีปัญหา
                        </label>

                        <input type="text"
                               name="device"
                               class="form-control"
                               placeholder="Laptop / Printer / Server"
                               required>

                    </div>

                    <div class="mb-4">

                        <label>
                            รายละเอียดปัญหา
                        </label>

                        <textarea name="issue"
                                  rows="5"
                                  class="form-control"
                                  placeholder="อธิบายปัญหาที่พบ..."
                                  required></textarea>

                    </div>

                    <button class="btn btn-submit w-100">

                        <i class="bi bi-send-fill"></i>
                        ส่งข้อมูลแจ้งซ่อม

                    </button>

                </form>

            </div>

        </div>

        <!-- RIGHT -->
<div class="col-lg-8">

    <div class="glass p-4">

        <!-- STATS -->
        <div class="stats-box">

            <div class="mini-card">
                <p>รายการแจ้งซ่อมทั้งหมด</p>
                <h3>{{ tickets|length }}</h3>
            </div>

        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="section-title mb-0">

                <div class="icon-box">
                    <i class="bi bi-clipboard-data-fill"></i>
                </div>

                รายการแจ้งซ่อมล่าสุด

            </div>

        </div>

        <div class="table-responsive">

            <table class="table align-middle">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>ชื่อ</th>
                    <th>อุปกรณ์</th>
                    <th>ปัญหา</th>
                </tr>

                </thead>

                <tbody>

                {% for t in tickets %}

                <tr>

                    <td>
                        <span class="ticket-id">
                            #{{ t.id }}
                        </span>
                    </td>

                    <td>
                        {{ t.name }}
                    </td>

                    <td>
                        <i class="bi bi-pc-display-horizontal"></i>
                        {{ t.device }}
                    </td>

                    <td>
                        {{ t.issue }}
                    </td>

                </tr>

                {% else %}

                <tr>

                    <td colspan="4" class="empty">

                        <i class="bi bi-database-x fs-1"></i>

                        <div class="mt-3">
                            ยังไม่มีข้อมูลแจ้งซ่อม
                        </div>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
