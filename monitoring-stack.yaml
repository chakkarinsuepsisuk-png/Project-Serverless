kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        image: grafana/grafana:latest
        name: grafana
        ports:
        - containerPort: 3000
        volumeMounts:
        - mountPath: /etc/grafana/provisioning/datasources
          name: grafana-datasource
        - mountPath: /etc/grafana/provisioning/dashboards
          name: grafana-dashboard-provider
        - mountPath: /var/lib/grafana/dashboards
          name: grafana-dashboard-json
      volumes:
      - configMap:
          name: grafana-datasource-config
        name: grafana-datasource
      - configMap:
          name: grafana-dashboard-provider-config
        name: grafana-dashboard-provider
      - configMap:
          name: grafana-dashboard-json
        name: grafana-dashboard-json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  ports:
  - nodePort: 30300
    port: 3000
    protocol: TCP
    targetPort: 3000
  selector:
    app: grafana
  type: NodePort
