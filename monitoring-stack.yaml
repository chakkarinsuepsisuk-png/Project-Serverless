apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
data:
  prometheus.yml: "global:\n  scrape_interval: 15s\n\nscrape_configs:\n  - job_name:\
    \ 'it-repair-api'\n    static_configs:\n      - targets: ['it-repair-api-svc.default.svc.cluster.local:80']\n"
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - args:
        - --config.file=/etc/prometheus/prometheus.yml
        image: prom/prometheus:latest
        name: prometheus
        ports:
        - containerPort: 9090
        volumeMounts:
        - mountPath: /etc/prometheus
          name: config-volume
      volumes:
      - configMap:
          name: prometheus-config
        name: config-volume
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  ports:
  - port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: v1
data:
  datasource.yml: "apiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n\
    \    access: proxy\n    url: http://prometheus-service.monitoring.svc.cluster.local:9090\n\
    \    isDefault: false\n    editable: true\n  - name: MySQL\n    type: mysql\n\
    \    url: 34.158.49.62:3306\n    database: it_repair\n    user: root\n    secureJsonData:\n\
    \      password: \"SuperSecretPassword123!\"\n    isDefault: true\n    editable:\
    \ true\n"
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: monitoring
---
apiVersion: v1
data:
  dashboard-provider.yml: "apiVersion: 1\nproviders:\n  - name: 'default'\n    orgId:\
    \ 1\n    folder: ''\n    type: file\n    disableDeletion: false\n    editable:\
    \ true\n    options:\n      path: /var/lib/grafana/dashboards\n      foldersFromFilesStructure:\
    \ false\n"
